<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="crucible — capital-free edge validation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#20232b"/><stop offset="1" stop-color="#14161b"/></linearGradient>
    <radialGradient id="glow" cx="16%" cy="50%" r="34%"><stop offset="0" stop-color="#f2b62c" stop-opacity="0.16"/><stop offset="1" stop-color="#f2b62c" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glow)"/>

  <!-- faint rising candlesticks (validated edge compounding) -->
  <g fill="#f2b62c" opacity="0.13">
    <rect x="1004" y="210" width="16" height="40" rx="3"/><rect x="1010" y="196" width="4" height="70" rx="2"/>
    <rect x="1052" y="188" width="16" height="52" rx="3"/><rect x="1058" y="172" width="4" height="86" rx="2"/>
    <rect x="1100" y="162" width="16" height="64" rx="3"/><rect x="1106" y="146" width="4" height="98" rx="2"/>
    <rect x="1148" y="132" width="16" height="78" rx="3"/><rect x="1154" y="116" width="4" height="112" rx="2"/>
  </g>

  <!-- cone-crucible mark (icon geometry, scaled) -->
  <g transform="translate(72,42) scale(1.07)">
    <path d="M60,64 L20,44" fill="none" stroke="#8b929c" stroke-width="10" stroke-linecap="round"/>
    <circle cx="18" cy="43" r="7" fill="#8b929c"/>
    <path d="M96,56 L54,64 C44,76 50,92 70,94 L150,106" fill="none" stroke="#b4bac4" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="126" cy="85" rx="30" ry="9" fill="#f2b62c" transform="rotate(42 126 85)"/>
    <ellipse cx="123" cy="81" rx="37" ry="12" fill="none" stroke="#b4bac4" stroke-width="10" transform="rotate(42 123 81)"/>
    <path d="M144,100 L166,107 L149,116 Z" fill="#b4bac4"/>
    <path d="M162,108 C162,132 158,152 155,170" fill="none" stroke="#f2b62c" stroke-width="14" stroke-linecap="round"/>
    <ellipse cx="165" cy="182" rx="50" ry="12" fill="#f2b62c"/>
    <rect x="173.5" y="142" width="5" height="44" rx="2.5" fill="#e04a4a"/><rect x="168" y="150" width="17" height="26" rx="4" fill="#e04a4a"/>
    <rect x="201.5" y="102" width="5" height="82" rx="2.5" fill="#35b45b"/><rect x="196" y="118" width="18" height="50" rx="4" fill="#35b45b"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="368" y="182" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="104" font-weight="600" letter-spacing="-3" fill="#f2efe8">crucible</text>
  <rect x="372" y="206" width="300" height="4" rx="2" fill="#f2b62c"/>
  <text x="372" y="252" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="400" fill="#9aa0aa">capital-free edge validation</text>
  <text x="372" y="290" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="400" fill="#6f7681">from trade log to verdict  ·  numpy + pandas  ·  MIT</text>
</svg>
