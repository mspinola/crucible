site_name: crucible
site_description: Measure the edge before you ever open a $100k account.
site_url: https://mspinola.github.io/crucible/
repo_url: https://github.com/mspinola/crucible
repo_name: mspinola/crucible
edit_uri: edit/main/docs/

theme:
  name: material
  logo: img/crucible_mark_white.png     # header bar (teal) — white cone-crucible mark
  favicon: img/crucible_favicon.png     # browser tab — slate, cone + pour + candle
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - Podcast: podcast.md
  - Run modes: run_modes.md
  - Visualizations: visualizations.md
  - The gauntlet (design): edge_gate.md
  - Architecture: architecture.md
  - Python support: python_support.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

# Styles the gauntlet gate names (REAL, STRONG, …) as one consistent token.
hooks:
  - docs/gate_tokens.py

extra_css:
  - stylesheets/extra.css
