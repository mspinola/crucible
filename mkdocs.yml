site_name: crucible
site_description: Measure the edge before you ever open a $100k account.
site_url: https://mspinola.github.io/crucible/
repo_url: https://github.com/mspinola/crucible
repo_name: mspinola/crucible
edit_uri: edit/main/docs/

theme:
  name: material
  logo: img/crucible_logo_white.png     # header bar (teal) — white mono mark
  favicon: img/crucible_logo.png        # browser tab — slate colorway
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - content.code.copy
    - search.suggest

nav:
  - Tutorial: index.md
  - The gauntlet (design): edge_gate.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css
